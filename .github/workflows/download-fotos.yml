name: Download Player Photos

on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC = 02:00 BRT — roda toda noite como fallback
    - cron: '0 5 * * *'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download photos + generate fotos.js
        run: node scripts/download-fotos.mjs

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fotos/ js/fotos.js
          if git diff --staged --quiet; then
            echo "Nenhuma mudança, nada a commitar."
          else
            git commit -m "chore: auto-download player photos [skip ci]"
            git push
          fi
